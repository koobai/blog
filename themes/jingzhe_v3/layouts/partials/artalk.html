<link href="https://img.koobai.com/Artalk.css" rel="stylesheet">
<script src="https://img.koobai.com/Artalk.js" defer></script>

{{ if eq .Type "posts" }}
<div id="Comments"></div>
{{ end }}

<script>
  // 1. 封装通用初始化
  function initArtalk(elSelector, key, title) {
    if (typeof Artalk === 'undefined') return;
    Artalk.init({
      el: elSelector,
      pageKey: key,
      pageTitle: title,
      server: '{{ $.Site.Params.artalk.server }}',
      site: '{{ $.Site.Params.artalk.site }}',
      darkMode: 'auto'
    });
  }

  // 2. 页面加载完毕后的自动展开逻辑
  document.addEventListener('DOMContentLoaded', function() {
    {{ if eq .Type "posts" }}
      initArtalk('#Comments', '{{ .RelPermalink }}', '{{ .Title }}');
    {{ else if and (eq .Type "laodao") (.IsPage) }}
      initArtalk('#artalk-{{ .File.TranslationBaseName }}', '{{ .RelPermalink }}', '唠叨 {{ .File.TranslationBaseName }}');
    {{ end }}
  });

  // 3. 极其纯粹的手风琴点击逻辑
  function toggleArtalk(id, permalink) {
    // 纯粹处理：如果没加载完，就默默 return 什么都不做，绝不弹窗打扰
    if (typeof Artalk === 'undefined') return; 

    const target = document.getElementById('artalk-' + id);
    if (!target) return;

    // 核心极简判断：里面有内容说明正在展示，点击就收起；没内容就展开
    if (target.innerHTML !== '') {
        target.style.display = 'none';
        target.innerHTML = '';
    } else {
        // 展开前，先把其他非主贴的框默默关掉
        document.querySelectorAll('.laodao-artalk-container').forEach(el => {
            if (!el.closest('.laodao-main-card')) {
                el.style.display = 'none';
                el.innerHTML = ''; 
            }
        });

        // 展开自己
        target.style.display = 'block';
        initArtalk('#artalk-' + id, permalink, '唠叨 ' + id);
    }
  }
</script>
