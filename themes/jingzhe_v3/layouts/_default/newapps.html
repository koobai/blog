{{ define "body_classes" }}page-app-admin{{ end }}
{{ define "main" }}

<script src="/js/coco-message.min.js" defer></script>
<script src="/js/Sortable.min.js" defer></script>

<div id="loginOverlay" style="display: none;">
    <input type="password" id="adminTokenInput" class="admin-login-input" placeholder="输入密钥">
    <button id="loginBtn" class="admin-login-btn" onclick="verifyToken()">验证</button>
</div>

<div id="adminPanel" style="display: none;">
    <div class="admin-header-actions">
        <button class="admin-app-add" onclick="openEditPanel(-1)">新增 APP</button>
        <button class="admin-app-github" onclick="syncToGithub()" id="syncBtn">同步至 GitHub</button>
    </div>
    <div id="appList"></div>
</div>

<div id="editModal" class="admin-overlay">
    <div class="admin-modal">
        <div class="admin-form-group">
            <input type="text" id="appTitle" class="admin-app-textarea" placeholder="名称">
        </div>
        
        <div class="admin-form-group">
            <div class="admin-input-wrap">
                <input type="text" id="appLink" class="admin-app-textarea" placeholder="链接">
                <button id="fetchIconBtn" class="admin-input-btn" onclick="autoFetchIcon()">获取图标</button>
            </div>
        </div>

        <div class="admin-form-group">
            <div class="admin-form-row">
                <img id="iconPreview" class="admin-icon-preview">
                <div class="admin-input-wrap" style="flex: 1;">
                    <input type="text" id="appIconUrl" class="admin-app-textarea" placeholder="图标链接">
                    <button id="uploadBtn" class="admin-input-btn" onclick="handleIconUpload()">上传</button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
            </div>
        </div>

        <div class="admin-form-group">
            <textarea id="appInfo" class="admin-app-textarea" placeholder="推荐理由"></textarea>
        </div>

        <div class="admin-form-group">
            <input type="text" id="appTags" class="admin-app-textarea" placeholder="标签 逗号分隔">
        </div>

        <div class="admin-popup-footer">
            <div class="admin-app-img-big">
                <label for="isStarApp" class="admin-app-img-big-b">大图推荐模式</label>
                <input type="checkbox" id="isStarApp" class="admin-app-img-big-a">
            </div>

            <div class="admin-edit-popup">
                <button class="admin-cancel" onclick="closeEditPanel()">取消</button>
                <button class="admin-modify" onclick="saveAppToMemory()">暂存修改</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 全局配置与状态管理
    // ==========================================
    const CONFIG = {
        workerUrl: "https://koobai-laodao.mekoobai.workers.dev",
        owner: "koobai", repo: "blog", branch: "main",
        upyunDomain: "https://img.koobai.com",
        jsonPath: "assets/app.json",
        storageKey: "koobai_app_draft"
    };

    let appData = { good: [] };
    let editingIndex = -1; 
    let sortableInstance = null; // 🚀 优化：增加 Sortable 实例缓存，防止内存泄漏

    const $ = id => document.getElementById(id);
    const getAdminToken = () => localStorage.getItem("koobai_admin_token") || "";
    
    const utf8_to_b64 = str => btoa(Array.from(new TextEncoder().encode(str), byte => String.fromCodePoint(byte)).join(''));
    const b64_to_utf8 = str => new TextDecoder().decode(Uint8Array.from(atob(str.replace(/\s/g, '')), m => m.codePointAt(0)));

    // ==========================================
    // 2. 核心网络与鉴权模块
    // ==========================================
    async function secureFetch(url, options = {}) {
        options.headers = { ...options.headers, 'x-admin-token': getAdminToken() };
        const res = await fetch(url, options);
        if (res.status === 401) throw new Error("401"); 
        return res;
    }

    async function verifyToken() {
        const token = $('adminTokenInput').value.trim();
        if (!token) return cocoMessage.warning("请输入密钥");
        
        $('loginBtn').disabled = true; 
        localStorage.setItem("koobai_admin_token", token);
        
        try {
            await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}` } }); 
            initApp();
            cocoMessage.success("验证成功");
        } catch (e) {
            localStorage.removeItem("koobai_admin_token");
            cocoMessage.error("密钥错误");
        } finally {
            $('loginBtn').disabled = false;
        }
    }

    // ==========================================
    // 3. 数据加载与渲染模块
    // ==========================================
    async function initApp() {
        if (getAdminToken()) {
            $('loginOverlay').style.display = 'none';
            $('adminPanel').style.display = 'block';
            await loadDataFromGithub();
        } else {
            $('loginOverlay').style.display = 'flex';
        }
    }

    async function loadDataFromGithub() {
        let loadMsg = cocoMessage.info("正在获取线上数据", 0);
        try {
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.jsonPath}?ref=${CONFIG.branch}`;
            const res = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': url } });
            const json = await res.json();
            
            let fetchedData = JSON.parse(b64_to_utf8(json.content));
            if (!fetchedData.good) fetchedData.good = []; 
            
            const savedDraft = localStorage.getItem(CONFIG.storageKey);
            if (savedDraft) {
                appData = JSON.parse(savedDraft);
                cocoMessage.warning("已恢复草稿", 3000);
            } else {
                appData = fetchedData;
            }
            
            renderList();
        } catch (e) {
            cocoMessage.error("拉取数据失败，请检查网络");
        } finally {
            if (typeof loadMsg === 'function') loadMsg();
        }
    }

    function renderList() {
        const container = $('appList');
        
        const htmlContent = appData.good.map((app, index) => {
            const isStar = !!app.title2;
            const title = isStar ? app.title2 : app.title;
            const img = isStar ? app.image2 : app.image;
            
            // 🚀 优化：简单正则过滤 XSS
            const rawLink = app.link || app.url || '';
            const finalLink = /^(https?:)?\/\//.test(rawLink) ? rawLink : 'javascript:;'; 
            
            // 标签分离逻辑
            const tags = Array.isArray(app.tags) ? app.tags.map(t => t.trim()) : [];
            const rightTagsHtml = tags.filter(t => ['开源', '付费', '免费'].includes(t))
                                      .map(t => `<span class="tag-status">${t}</span>`).join('');
            const leftTagsHtml = tags.filter(t => !['开源', '付费', '免费'].includes(t))
                                     .map(t => `<span class="tag-platform">${t}</span>`).join('');

            return `
                <div class="app-card ${isStar ? 'app-card-star' : ''}">
                    ${isStar ? `
                    <div class="app-bg-img"><img src="${img}" alt="${title}"></div>
                    ` : `
                    <a href="${finalLink}" target="_blank" rel="noopener noreferrer">
                        <img class="app-icon" src="${img}" alt="${title}">
                    </a>`}

                    <div class="app-content">
                        <a class="app-title" href="${finalLink}" target="_blank" rel="noopener noreferrer">${title}</a>
                        <div class="app-desc">${app.info || ''}</div>
                        <div class="app-tags-left">${leftTagsHtml}</div>
                    </div>

                    <div class="app-tags-right">${rightTagsHtml}</div>

                    <div class="admin-card-actions">
                        <button class="admin-btn admin-btn-edit" onclick="openEditPanel(${index})">编辑</button>
                        <button class="admin-btn admin-btn-delete" onclick="deleteApp(${index})">删除</button>
                    </div>
                </div>
            `;
        }).join(''); 

        container.innerHTML = `<div class="app-list" id="appGridContainer">${htmlContent}</div>`;

        // 🚀 优化：销毁旧实例，防止重复绑定和内存泄露
        if (typeof Sortable !== 'undefined') {
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            sortableInstance = new Sortable($('appGridContainer'), {
                animation: 250, 
                ghostClass: 'admin-sortable-ghost',
                filter: 'a, a *, button, button *', 
                preventOnFilter: false,
                onEnd: function (evt) {
                    if (evt.oldIndex === evt.newIndex) return;
                    
                    const movedItem = appData.good.splice(evt.oldIndex, 1)[0];
                    appData.good.splice(evt.newIndex, 0, movedItem);
                    
                    localStorage.setItem(CONFIG.storageKey, JSON.stringify(appData));
                    renderList(); 
                    cocoMessage.success("排序已暂存");
                }
            });
        }
    }

    // ==========================================
    // 4. 图标抓取与图片处理模块
    // ==========================================
    async function autoFetchIcon() {
        const link = $('appLink').value.trim();
        if (!link) return cocoMessage.warning("请先填入链接！");
        
        $('fetchIconBtn').disabled = true; 
        let msg = cocoMessage.info("正在获取图标", 0);

        try {
            if (link.includes('apple.com') && link.match(/id(\d+)/)) {
                const appleMatch = link.match(/id(\d+)/);
                try {
                    const res = await fetch(`https://itunes.apple.com/lookup?id=${appleMatch[1]}`);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        $('appIconUrl').value = data.results[0].artworkUrl512;
                        $('iconPreview').src = data.results[0].artworkUrl512;
                        $('iconPreview').style.display = 'block';
                        cocoMessage.success("已获取 App Store 图标");
                        return;
                    }
                } catch (e) { console.log("Apple 接口解析失败"); }
            }

            const domain = new URL(link).hostname;
            const iconUrl = `https://icon.horse/icon/${domain}`;
            
            $('appIconUrl').value = iconUrl;
            $('iconPreview').src = iconUrl;
            $('iconPreview').style.display = 'block';
            cocoMessage.success("已精准获取官网官方图标！");
        } catch (e) {
            cocoMessage.error("链接格式有误，请填写带 http/https 的完整网址");
        } finally {
            if (typeof msg === 'function') msg();
            $('fetchIconBtn').disabled = false;
        }
    }

    async function handleIconUpload() {
        const currentUrl = $('appIconUrl').value.trim();
        
        if (currentUrl && currentUrl.startsWith('http') && !currentUrl.includes(CONFIG.upyunDomain)) {
            $('uploadBtn').disabled = true; 
            let msg = cocoMessage.info("正在获取远程图标", 0);
            try {
                const res = await fetch(currentUrl);
                if (!res.ok) throw new Error("Fetch failed");
                const blob = await res.blob();
                
                if (typeof msg === 'function') msg();
                await processAndUploadBlob(blob);
            } catch (e) {
                if (typeof msg === 'function') msg();
                cocoMessage.error("该图片跨域拦截较严，请保存到本地后上传");
                $('imageInput').click(); 
            } finally {
                $('uploadBtn').disabled = false;
            }
        } else {
            $('imageInput').click();
        }
    }

    async function processAndUploadBlob(blobOrFile) {
        let msg = cocoMessage.info("正在压缩并上传至又拍云", 0); 
        try {
            const canvas = document.createElement('canvas');
            const img = new Image(); 
            // 🚀 优化：使用完 createObjectURL 后立即 revoke 释放内存
            const objectUrl = URL.createObjectURL(blobOrFile);
            img.src = objectUrl;
            await new Promise(r => img.onload = r);
            URL.revokeObjectURL(objectUrl); 
            
            let { width, height } = img;
            if (width > 1000) { height *= 1000/width; width = 1000; }
            
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            
            canvas.toBlob(async (blob) => {
                const fileName = `apps/${Date.now()}_${Math.random().toString(36).substr(2, 4)}.webp`;
                await secureFetch(`${CONFIG.workerUrl}/api/upload?name=${fileName}`, { method: 'POST', body: blob });
                const finalUrl = `${CONFIG.upyunDomain}/${fileName}`;
                
                $('appIconUrl').value = finalUrl;
                $('iconPreview').src = finalUrl;
                $('iconPreview').style.display = 'block';
                cocoMessage.success("成功！图片已存入又拍云"); 
                if (typeof msg === 'function') msg();
            }, 'image/webp', 0.75); 
        } catch(err) { 
            cocoMessage.error("图片处理或上传失败"); 
            if (typeof msg === 'function') msg(); 
        }
    }

    $('imageInput').addEventListener('change', async function(e) {
        const file = e.target.files[0]; 
        if (!file) return;
        $('uploadBtn').disabled = true; 
        await processAndUploadBlob(file);
        $('uploadBtn').disabled = false;
        this.value = ''; 
    });

    // ==========================================
    // 5. 交互行为控制：弹窗、增删改存
    // ==========================================
    function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    $('appInfo').addEventListener('input', function() {
        autoResizeTextarea(this);
    });

    function openEditPanel(index) {
        editingIndex = index;
        if (index !== -1) {
            const app = appData.good[index];
            const isStar = !!app.title2;
            $('appTitle').value = isStar ? app.title2 : app.title;
            $('appLink').value = app.link || app.url || '';
            $('appIconUrl').value = isStar ? app.image2 : app.image;
            $('appInfo').value = app.info || '';
            
            // 🚀 优化：防御性判断旧数据的 string 类型 tags
            $('appTags').value = Array.isArray(app.tags) ? app.tags.join(', ') : (app.tags || '');
            
            $('isStarApp').checked = isStar;
            $('iconPreview').src = $('appIconUrl').value;
            $('iconPreview').style.display = $('appIconUrl').value ? 'block' : 'none';
        } else {
            $('appTitle').value = ''; $('appLink').value = ''; $('appIconUrl').value = '';
            $('appInfo').value = ''; $('appTags').value = ''; $('isStarApp').checked = false;
            $('iconPreview').style.display = 'none';
        }
        $('editModal').style.display = 'flex';
        // 统一触发 textarea 高度重置
        setTimeout(() => autoResizeTextarea($('appInfo')), 10);
    }

    function closeEditPanel() { $('editModal').style.display = 'none'; }

    function deleteApp(index) {
        if(confirm("确定要删除吗？")) {
            appData.good.splice(index, 1);
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(appData));
            renderList();
            cocoMessage.success("删除已暂存");
        }
    }

    function saveAppToMemory() {
        const title = $('appTitle').value.trim();
        const link = $('appLink').value.trim();
        const info = $('appInfo').value.trim();
        const imgUrl = $('appIconUrl').value.trim();
        const tags = $('appTags').value.split(',').map(t => t.trim()).filter(Boolean);
        const isStar = $('isStarApp').checked;

        if (!title || !link || !imgUrl) return cocoMessage.warning("名称/链接/图片必填");

        // 🚀 优化：完美继承老数据的所有未知属性
        let newObj = editingIndex === -1 ? {} : { ...appData.good[editingIndex] };
        
        newObj.info = info;
        newObj.link = link;
        newObj.tags = tags;

        // 巧妙处理大图/小图的 Key 互斥问题
        if (isStar) {
            newObj.title2 = title;
            newObj.image2 = imgUrl;
            delete newObj.title;
            delete newObj.image;
        } else {
            newObj.title = title;
            newObj.image = imgUrl;
            delete newObj.title2;
            delete newObj.image2;
        }

        if (editingIndex === -1) {
            appData.good.unshift(newObj);
        } else {
            appData.good[editingIndex] = newObj;
        }
        
        localStorage.setItem(CONFIG.storageKey, JSON.stringify(appData));
        renderList();
        closeEditPanel();
        cocoMessage.success("修改已成功暂存");
    }

    // ==========================================
    // 6. GitHub 同步发布模块
    // ==========================================
    async function syncToGithub() {
        $('syncBtn').disabled = true;
        let msg = cocoMessage.info("正在推送至 GitHub", 0);
        
        try {
            const getUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.jsonPath}?ref=${CONFIG.branch}`;
            const getRes = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': getUrl } });
            const getData = await getRes.json();
            const realSha = getData.sha; 

            if (!realSha) throw new Error("无法获取线上文件状态，请检查网络");

            const now = new Date();
            const formattedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            appData.update_time = formattedDate;

            const prettyJson = JSON.stringify(appData, null, 4);
            const payload = { 
                message: "chore: update app recommend list & time", 
                content: utf8_to_b64(prettyJson), 
                branch: CONFIG.branch,
                sha: realSha
            };

            const putUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.jsonPath}`;
            
            const res = await secureFetch(`${CONFIG.workerUrl}/api/github`, {
                method: 'PUT', 
                headers: { 'x-target-url': putUrl, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) throw new Error("推送被拒绝");

            localStorage.removeItem(CONFIG.storageKey); 
            cocoMessage.success("推送成功");

        } catch (e) {
            console.error("同步异常:", e);
            cocoMessage.error("推送失败，请检查密钥或网络状态");
        } finally {
            if (typeof msg === 'function') msg();
            $('syncBtn').disabled = false;
        }
    }

    window.addEventListener('load', function() {
        initApp();
    });
</script>
{{ end }}
