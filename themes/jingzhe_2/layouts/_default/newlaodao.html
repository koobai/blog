{{ define "body_classes" }}page-laodao-admin{{ end }}
{{ define "main" }}

<script src="/js/coco-message.min.js" defer></script>

<div id="loginOverlay" style="display: none;">
    <input type="password" id="adminTokenInput" class="admin-login-input" placeholder="输入密钥">
    <button class="admin-login-btn" onclick="verifyToken()">验证</button>
</div>

<div id="adminPanel" style="display: none;" class="admin-immersive-wrapper">
    
    <div class="admin-publish-card">
        <div class="laodao-footer admin-publish-footer">    
            <div class="admin-toolbar">
                <div class="admin-icon-btn admin-icon-bold" title="加粗" onclick="insertBold()">
                   <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path fill="currentColor" fill-rule="evenodd" d="M4 3a1 1 0 0 1 1-1h6a4.5 4.5 0 0 1 3.274 7.587A4.75 4.75 0 0 1 11.25 18H5a1 1 0 0 1-1-1zm2.5 5.5v-4H11a2 2 0 1 1 0 4zm0 2.5v4.5h4.75a2.25 2.25 0 0 0 0-4.5z" clip-rule="evenodd"/></svg>
                </div>

                <div class="admin-icon-btn admin-icon-link" title="插入链接" onclick="insertLink()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256"><path fill="currentColor" d="M117.18 188.74a12 12 0 0 1 0 17l-5.12 5.12A58.26 58.26 0 0 1 70.6 228a58.62 58.62 0 0 1-41.46-100.08l34.75-34.75a58.64 58.64 0 0 1 98.56 28.11a12 12 0 1 1-23.37 5.44a34.65 34.65 0 0 0-58.22-16.58l-34.75 34.75A34.62 34.62 0 0 0 70.57 204a34.4 34.4 0 0 0 24.49-10.14l5.11-5.12a12 12 0 0 1 17.01 0M226.83 45.17a58.65 58.65 0 0 0-82.93 0l-5.11 5.11a12 12 0 0 0 17 17l5.12-5.12a34.63 34.63 0 1 1 49 49l-34.81 34.7A34.4 34.4 0 0 1 150.61 156a34.63 34.63 0 0 1-33.69-26.72a12 12 0 0 0-23.38 5.44A58.64 58.64 0 0 0 150.56 180h.05a58.28 58.28 0 0 0 41.47-17.17l34.75-34.75a58.62 58.62 0 0 0 0-82.91"/></svg>
                </div>

               <label class="admin-icon-btn" title="上传图片" style="margin: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M15 8h.01M3 6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/><path d="m3 16l5-5c.928-.893 2.072-.893 3 0l5 5"/><path d="m14 14l1-1c.928-.893 2.072-.893 3 0l3 3"/></g></svg>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                </label>

                <div class="admin-icon-btn" title="获取定位" onclick="getLocation(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>

                <div class="admin-icon-btn admin-icon-emoji" title="插入表情" onclick="showEmoji(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
                </div>

                <div class="admin-icon-btn" title="最近唠叨" onclick="toggleRecentList()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 7c0 2.21-4.03 4-9 4S3 9.21 3 7m18 0c0-2.21-4.03-4-9-4S3 4.79 3 7m18 0v5M3 7v5m18 0c0 2.21-4.03 4-9 4s-9-1.79-9-4m18 0v5c0 2.21-4.03 4-9 4s-9-1.79-9-4v-5"/></svg>
                </div>
            </div>
            
            <div class="admin-actions">
                <button id="cancelBtn" class="admin-btn admin-btn-cancel" onclick="cancelEdit()" style="display: none;">取消</button>
                <button id="submitBtn" class="admin-btn" onclick="publishPost()">唠叨一下</button>
            </div>
        </div>
        
        <div class="laodao-content datacont">
            <textarea id="content" class="admin-textarea" placeholder=" " autofocus></textarea>
            <div id="tagSelector" class="tag-selector-dropdown"></div>
            <div id="locationDisplay" class="admin-location-chip" style="display: none;"></div>
        </div>
    </div>
    
    <div id="recentListWrap" class="admin-laodao-list">
        <div id="recentList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        workerUrl: "https://koobai-laodao.mekoobai.workers.dev",
        owner: "koobai", repo: "blog", branch: "main",
        upyunDomain: "https://img.koobai.com",
        mapboxToken: "pk.eyJ1Ijoia29vYmFpIiwiYSI6ImNsZzYybDcwajA5ZXYzc3A4ZnJvcW0wMHcifQ._bpJ1Gmu8hZsfxuoimTAcw"
    };

    const CACHE_KEY = 'koobai_laodao_draft'; // 📍 唠叨专属草稿 Key
    const STATE = { sha: null, path: null, date: null, emoji: null, location: null };
    let hasFetchedRecent = false; 
    let draftTimer; // 草稿防抖定时器

    let cachedTags = [];
    let filteredTags = [];
    let currentTagIndex = -1;

    const $ = id => document.getElementById(id);
    const contentEl = $('content'); // 缓存高频 DOM
    const getAdminToken = () => localStorage.getItem("koobai_admin_token") || "";
    
    const utf8_to_b64 = str => btoa(Array.from(new TextEncoder().encode(str), byte => String.fromCodePoint(byte)).join(''));
    const b64_to_utf8 = str => new TextDecoder().decode(Uint8Array.from(atob(str), c => c.charCodeAt(0)));

    function getFormattedTime() {
        const d = new Date(new Date().getTime() + 8 * 3600 * 1000);
        return { 
            year: d.getUTCFullYear(), month: String(d.getUTCMonth() + 1).padStart(2, '0'),
            day: String(d.getUTCDate()).padStart(2, '0'), hour: String(d.getUTCHours()).padStart(2, '0'),
            min: String(d.getUTCMinutes()).padStart(2, '0'), sec: String(d.getUTCSeconds()).padStart(2, '0')
        };
    }

    async function secureFetch(url, options = {}) {
        options.headers = { ...options.headers, 'x-admin-token': getAdminToken() };
        const res = await fetch(url, options);
        if (res.status === 401) throw new Error("401"); 
        return res;
    }

    // ==========================================
    // 📍 核心：自动草稿箱逻辑
    // ==========================================
    function scheduleSaveDraft() {
        if (STATE.sha) return; // 编辑旧动态时不存本地草稿
        clearTimeout(draftTimer);
        draftTimer = setTimeout(() => {
            const draft = { 
                content: contentEl.value, 
                location: STATE.location 
            };
            localStorage.setItem(CACHE_KEY, JSON.stringify(draft));
        }, 800);
    }

    function loadDraft() {
        if (STATE.sha) return;
        const saved = localStorage.getItem(CACHE_KEY);
        if (saved) {
            try {
                const draft = JSON.parse(saved);
                if (draft.content) { 
                    contentEl.value = draft.content; 
                    contentEl.dispatchEvent(new Event('input')); 
                }
                if (draft.location) { 
                    STATE.location = draft.location; 
                    renderLocation(); 
                }
            } catch(e) {}
        }
    }

    async function fetchAllTags() {
        if (cachedTags.length > 0) return;
        try {
            const res = await fetch('/laodaotags/index.xml?t=' + Date.now());
            if (res.ok) {
                const text = await res.text();
                const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
                const titles = Array.from(xmlDoc.querySelectorAll("item title")).map(t => t.textContent);
                cachedTags = [...new Set(titles)]; 
            }
        } catch(e) {}
    }

    function initApp() {
        if (getAdminToken()) {
            $('loginOverlay').style.display = 'none';
            $('adminPanel').style.display = 'block';
            fetchAllTags(); 
            loadDraft(); // 初始化时加载草稿
            setTimeout(() => contentEl.focus(), 100); 
        } else {
            $('loginOverlay').style.display = 'flex';
            $('adminPanel').style.display = 'none';
            setTimeout(() => $('adminTokenInput').focus(), 100);
        }
    }

    async function verifyToken() {
        const token = $('adminTokenInput').value.trim();
        if (!token) return cocoMessage.warning("请输入密钥");
        localStorage.setItem("koobai_admin_token", token);
        try {
            await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}` } }); 
            $('loginOverlay').style.display = 'none';
            $('adminPanel').style.display = 'block';
            cocoMessage.success("验证成功");
            fetchAllTags(); 
            loadDraft();
            contentEl.focus();
        } catch (e) {
            logout(false);
            cocoMessage.error("密钥错误，请重新输入");
        }
    }

    function logout(reload = true) {
        localStorage.removeItem("koobai_admin_token");
        reload ? location.reload() : ($('loginOverlay').style.display = 'flex', $('adminPanel').style.display = 'none');
    }

    function insertText(text, wrap = '', offset = 0) {
        contentEl.focus({ preventScroll: true });
        const { selectionStart: start, selectionEnd: end } = contentEl;
        const sel = contentEl.value.substring(start, end);
        const result = sel ? `${wrap}${sel}${wrap === '[' ? ']()' : wrap}` : text;
        
        contentEl.setRangeText(result, start, end, 'end');
        contentEl.setSelectionRange(start + result.length - offset, start + result.length - offset);
        contentEl.dispatchEvent(new Event('input')); 
    }

    const insertLink = () => insertText("[]()", "[", 1);

    function insertBold() {
        contentEl.focus({ preventScroll: true });
        const start = contentEl.selectionStart; const end = contentEl.selectionEnd;
        const sel = contentEl.value.substring(start, end);
        const result = sel ? ` **${sel}** ` : ` **加粗文字** `;
        contentEl.setRangeText(result, start, end, 'end');
        if (!sel) contentEl.setSelectionRange(start + 3, start + 3 + 4);
        contentEl.dispatchEvent(new Event('input'));
    }

    async function showEmoji(btn) {
        if (STATE.emoji) { STATE.emoji.remove(); STATE.emoji = null; return; }
        if (!window.emojisData) {
            try { window.emojisData = (await fetch('/suju/owo.json').then(r => r.json())).Emoji.container; } 
            catch { return cocoMessage.error("获取表情失败"); }
        }
        
        const div = document.createElement('div');
        div.className = 'emoji-selector'; 
        div.innerHTML = window.emojisData.map(e => `<div class="emoji-item" title="${e.text}">${e.icon}</div>`).join('');
        div.onclick = (e) => {
            const item = e.target.closest('.emoji-item');
            if (item) insertText(item.innerText);
        };
        btn.closest('.admin-publish-footer').after(div);
        STATE.emoji = div;
    }

    const GeoHelper = {
        getPosition: () => new Promise((resolve, reject) => {
            if (!navigator.geolocation) return reject("浏览器不支持定位");
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, enableHighAccuracy: true });
        }),
        getAddress: async (lat, lon) => {
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${lon},${lat}.json?access_token=${CONFIG.mapboxToken}&language=zh-CN`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.features && data.features.length > 0) {
                const target = data.features.find(f => !f.place_type.includes('postcode') && !/^\d+$/.test(f.text));
                return target ? target.text : data.features[0].text;
            }
            return "未知位置";
        }
    };

    async function getLocation(btn) {
        if (STATE.location) return; 
        let locMsg = cocoMessage.info("正在与卫星通信...", 0);
        try {
            const pos = await GeoHelper.getPosition();
            const { latitude, longitude } = pos.coords;
            const name = await GeoHelper.getAddress(latitude, longitude);
            
            STATE.location = { name, lat: latitude, lng: longitude };
            renderLocation();
            scheduleSaveDraft(); // 获取到定位后立即保存草稿
            
            if (typeof locMsg === 'function') locMsg();
            cocoMessage.success("定位成功");
        } catch (e) {
            if (typeof locMsg === 'function') locMsg();
            cocoMessage.error(typeof e === 'string' ? e : "定位获取失败，请检查权限");
        }
    }

    function renderLocation() {
        const locDiv = $('locationDisplay');
        if (STATE.location) {
            locDiv.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span class="admin-location-text" onclick="editLocation()" title="点击可修改名称">${STATE.location.name}</span>
                <svg onclick="removeLocation()" title="移除" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5;cursor:pointer;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            `;
            locDiv.style.display = 'flex';
        } else {
            locDiv.style.display = 'none';
            locDiv.innerHTML = '';
        }
    }

    function editLocation() {
        if (!STATE.location) return;
        const newName = prompt('修改你想展示的位置名称:', STATE.location.name);
        if (newName && newName.trim()) {
            STATE.location.name = newName.trim();
            renderLocation();
            scheduleSaveDraft();
        }
    }

    function removeLocation() {
        STATE.location = null;
        renderLocation();
        scheduleSaveDraft();
    }

    const compressImage = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let { width, height } = img; const MAX = 1500;
                if (width > height) { if (width > MAX) { height *= MAX / width; width = MAX; } } 
                else { if (height > MAX) { width *= MAX / height; height = MAX; } }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                canvas.toBlob(resolve, 'image/webp', 0.75);
            }; img.onerror = reject;
        }; reader.onerror = reject;
    });

    $('imageInput').addEventListener('change', async function(e) {
        const files = e.target.files; if (!files.length) return;
        let uploadMsg = cocoMessage.info("正在压缩并上传", 0); 
        
        for (let file of files) {
            if (!file.type.startsWith('image/')) continue;
            try {
                const webpBlob = await compressImage(file);
                const fileName = `memos/${Date.now()}_${Math.random().toString(36).substr(2, 6)}.webp`;
                await secureFetch(`${CONFIG.workerUrl}/api/upload?name=${fileName}`, { method: 'POST', body: webpBlob });
                insertText(`\n![img](${CONFIG.upyunDomain}/${fileName})`);
            } catch (err) { 
                if (typeof uploadMsg === 'function') uploadMsg();
                if (err.message === "401") return (cocoMessage.error("登录状态失效"), logout()); 
                return cocoMessage.error("图片上传失败"); 
            }
        }
        if (typeof uploadMsg === 'function') uploadMsg();
        cocoMessage.success("图片准备就绪！"); this.value = '';
    });

    async function publishPost() {
        const contentVal = contentEl.value.trim();
        if (!contentVal) return cocoMessage.warning("写点什么再发吧！");
        
        $('submitBtn').disabled = true; 
        let pubMsg = cocoMessage.info("正在校验状态并安全推送...", 0);

        const tags = [...new Set(Array.from(contentVal.matchAll(/#([^\s<.,!?'"，。！？]+)/g), m => m[1]))];
        const tagStr = tags.length ? `\nlaodaotags:\n${tags.map(t => `  - ${t}`).join('\n')}` : "";
        const { year, month, day, hour, min, sec } = getFormattedTime();
        const finalTime = (STATE.sha && STATE.date) ? STATE.date : `${year}-${month}-${day}T${hour}:${min}:${sec}+08:00`;
        
        let frontmatter = `---\ndate: ${finalTime}${tagStr}\n`;
        if (STATE.location) frontmatter += `location: "${STATE.location.name}"\nlatlng: "${STATE.location.lat},${STATE.location.lng}"\n`;
        frontmatter += `---\n\n`;

        const finalMD = frontmatter + contentVal + '\n';
        const path = STATE.path || `content/laodao/${year}/${month}/${year}${month}${day}-${hour}${min}${sec}.md`;
        const targetUrl = encodeURI(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        
        try {
            // 🚀 核心防 422 优化：修改旧唠叨前动态拉取最新的 SHA
            if (STATE.sha || STATE.path) {
                const checkRes = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': targetUrl } });
                if (checkRes.ok) window.STATE.sha = (await checkRes.json()).sha;
            }

            const payload = { message: STATE.sha ? "修改一下" : "唠叨一下", content: utf8_to_b64(finalMD), branch: CONFIG.branch };
            if (STATE.sha) payload.sha = STATE.sha;

            await secureFetch(`${CONFIG.workerUrl}/api/github`, {
                method: 'PUT', headers: { 'x-target-url': targetUrl, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (typeof pubMsg === 'function') pubMsg();
            cocoMessage.success("唠叨成功！搞定！"); 
            
            if (!STATE.sha) localStorage.removeItem(CACHE_KEY); // 发布成功清除草稿
            
            cancelEdit(false); 
            if($('recentListWrap').style.display === 'block') { hasFetchedRecent = false; fetchRecent(); }
        } catch (err) { 
            if (typeof pubMsg === 'function') pubMsg();
            err.message === "401" ? (cocoMessage.error("登录状态失效"), logout()) : cocoMessage.error("唠叨失败"); 
        } finally {
            $('submitBtn').disabled = false;
        }
    }

    async function toggleRecentList() {
        const wrap = $('recentListWrap');
        if (wrap.style.display === 'block') { wrap.style.display = 'none'; return; }
        if (!hasFetchedRecent) {
            let loadMsg = cocoMessage.info("正在获取最新一条唠叨", 0);
            const success = await fetchRecent(); 
            if (typeof loadMsg === 'function') loadMsg();
            if (!success) return; 
        }
        wrap.style.display = 'block';
    }

    async function fetchRecent() {
        const commitsUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/commits?path=content/laodao&per_page=3&sha=${CONFIG.branch}`;
        try {
            const res = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': commitsUrl } });
            if (!res.ok) { cocoMessage.warning("暂无提交记录"); $('recentList').innerHTML = ''; return false; }
            
            const commits = await res.json();
            let latestFile = null;

            for (const commit of commits) {
                const detailRes = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': commit.url } });
                const detail = await detailRes.json();
                if (!detail.files) continue;
                latestFile = detail.files.find(f => f.filename.startsWith('content/laodao/') && f.filename.endsWith('.md'));
                if (latestFile) break;
            }

            if (!latestFile) { cocoMessage.warning("近期没有唠叨被修改"); $('recentList').innerHTML = ''; return false; }

            hasFetchedRecent = true; 
            const fileUrl = encodeURI(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${latestFile.filename}?ref=${CONFIG.branch}`);
            const fRes = await secureFetch(`${CONFIG.workerUrl}/api/github`, { headers: { 'x-target-url': fileUrl } });
            const json = await fRes.json(); 
            
            const rawText = b64_to_utf8(json.content);
            const body = rawText.replace(/---[\s\S]*?---/, '').trim();
            const previewText = body.replace(/!\[.*?\]\(.*?\)/g, '[图片]').substring(0, 20) + (body.length > 20 ? '...' : '');

            $('recentList').innerHTML = `
            <div class="card-timeline laodao-card admin-recent-card" onclick="loadForEdit('${latestFile.filename}', '${json.sha}', \`${encodeURIComponent(rawText)}\`)">
                <div class="laodao-content datacont admin-recent-content" style="margin: 0;">
                    ${previewText}
                </div>
            </div>`;
            return true;
        } catch(err) { 
            $('recentList').innerHTML = ''; 
            err.message === "401" ? (cocoMessage.error("密钥失效，请重新登录"), logout()) : cocoMessage.error("网络异常，拉取失败");
            return false;
        }
    }

    function loadForEdit(path, sha, encodedRawText) {
        const rawText = decodeURIComponent(encodedRawText);
        const timeMatch = rawText.match(/date:\s*([^\n]+)/);
        STATE.date = timeMatch ? timeMatch[1].trim() : null;
        STATE.path = path; STATE.sha = sha;

        const locationMatch = rawText.match(/location:\s*"([^"]+)"/);
        const latlngMatch = rawText.match(/latlng:\s*"([^"]+)"/);
        
        if (locationMatch && latlngMatch) {
            const [lat, lng] = latlngMatch[1].split(',');
            STATE.location = { name: locationMatch[1], lat: lat, lng: lng };
        } else {
            STATE.location = null;
        }
        renderLocation();

        contentEl.value = rawText.replace(/---[\s\S]*?---/, '').trim() + ' '; 
        $('submitBtn').innerText = "修改"; 
        $('cancelBtn').style.display = 'inline-block'; 
        if (STATE.emoji) { STATE.emoji.remove(); STATE.emoji = null; }
        
        contentEl.dispatchEvent(new Event('input'));
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit(showMsg = true) {
        contentEl.value = ''; 
        contentEl.style.height = 'auto'; 
        STATE.sha = STATE.path = STATE.date = null;
        STATE.location = null;
        renderLocation();

        $('submitBtn').innerText = "唠叨一下"; 
        $('cancelBtn').style.display = 'none';
        if (STATE.emoji) { STATE.emoji.remove(); STATE.emoji = null; }
        
        loadDraft(); // 取消后恢复本地可能存在的草稿
        if (showMsg) cocoMessage.info("已取消修改");
    }

    const tagSelector = $('tagSelector');
    tagSelector.style.display = 'none';

    function updateTagHighlight(items) {
        items.forEach((item, i) => {
            if (i === currentTagIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    function insertSelectedTag(tag, keywordLength, cursorStart) {
        const before = contentEl.value.substring(0, cursorStart - keywordLength - 1);
        const after = contentEl.value.substring(cursorStart);
        const insertText = `#${tag} `;
        
        contentEl.value = before + insertText + after;
        contentEl.setSelectionRange(before.length + insertText.length, before.length + insertText.length);
        
        tagSelector.style.display = 'none';
        contentEl.focus();
        contentEl.dispatchEvent(new Event('input'));
    }

    tagSelector.addEventListener('mousedown', function(e) {
        const item = e.target.closest('.tag-item');
        if (!item) return;
        e.preventDefault();
        
        const cursorPosition = contentEl.selectionStart;
        const match = contentEl.value.substring(0, cursorPosition).match(/(?:^|\s)#([^\s]*)$/);
        
        if (match) {
            insertSelectedTag(filteredTags[item.dataset.index], match[1].length, cursorPosition);
        }
    });

    function checkTagTrigger() {
        const cursorPosition = contentEl.selectionStart;
        const textBeforeCursor = contentEl.value.substring(0, cursorPosition);
        const match = textBeforeCursor.match(/(?:^|\s)#([^\s]*)$/);

        if (match) {
            const keywordLower = match[1].toLowerCase();
            filteredTags = cachedTags.filter(t => t.toLowerCase().includes(keywordLower));
            
            if (filteredTags.length > 0) {
                tagSelector.innerHTML = filteredTags.map((t, i) => `<div class="tag-item" data-index="${i}"># ${t}</div>`).join('');
                tagSelector.style.display = 'grid'; 
                currentTagIndex = -1; 
            } else {
                tagSelector.style.display = 'none';
            }
        } else {
            tagSelector.style.display = 'none';
        }
    }

    contentEl.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        checkTagTrigger();
        scheduleSaveDraft(); // 监听输入存草稿
    });

    contentEl.addEventListener('keyup', function(e) {
        if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && tagSelector.style.display === 'none') {
             checkTagTrigger();
        }
    });

    contentEl.addEventListener('keydown', function(e) {
        if (tagSelector.style.display === 'grid') {
            const items = tagSelector.querySelectorAll('.tag-item');
            const total = items.length; const cols = 4;
            if (e.key === 'ArrowRight') {
                e.preventDefault(); currentTagIndex = currentTagIndex === -1 ? 0 : Math.min(currentTagIndex + 1, total - 1); updateTagHighlight(items);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault(); currentTagIndex = currentTagIndex === -1 ? 0 : Math.max(currentTagIndex - 1, 0); updateTagHighlight(items);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault(); currentTagIndex = currentTagIndex === -1 ? 0 : Math.min(currentTagIndex + cols, total - 1); updateTagHighlight(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault(); currentTagIndex = currentTagIndex === -1 ? 0 : Math.max(currentTagIndex - cols, 0); updateTagHighlight(items);
            } else if (e.key === 'Enter') {
                if (currentTagIndex >= 0) { e.preventDefault(); items[currentTagIndex].dispatchEvent(new MouseEvent('mousedown', { bubbles: true })); } 
                else { tagSelector.style.display = 'none'; }
            } else if (e.key === ' ' || e.key === 'Escape') {
                tagSelector.style.display = 'none';
            }
        }
    });

    initApp();
</script>
