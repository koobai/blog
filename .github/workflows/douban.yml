name: douban
on: 
  workflow_dispatch:
  repository_dispatch:
    types: [douban-sync]

jobs:
  douban:
    name: Self-hosted Douban Sync
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    # 1. 运行轻量化抓取脚本（已移除图片处理依赖和 TMDB 密钥）
    - name: Fetch Movie Data
      run: python sync_movies.py

    # 2. 提交代码：只在 JSON 发生变化时提交，保持 Git 干净
    - name: Commit
      if: env.HAS_NEW_DATA == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        message: 'chore: sync new movies data'
        add: './assets/movie.json'