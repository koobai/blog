name: douban
on: 
  workflow_dispatch:
  repository_dispatch:
    types: [douban-sync]

jobs:
  douban:
    name: Self-hosted Douban Sync
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install Pillow

    # 1. 直接跑我们自己的无敌抓取脚本！
    - name: Fetch Data and Posters
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: python sync_movies.py

    # 2. 上传海报：0 秒极速跳过魔法
    - name: Sync Images to Upyun S3
      if: env.HAS_NEW_POSTERS == 'true'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.UPYUN_OPERATOR }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.UPYUN_PASSWORD }}
        AWS_DEFAULT_REGION: us-east-1 
      run: |
        aws s3 sync ./temp_posters s3://${{ secrets.UPYUN_SERVICE }}/movie/ --endpoint-url https://s3.api.upyun.com

    # 3. 提交代码：只在 JSON 发生变化时提交，保持 Git 干净
    - name: Commit
      if: env.HAS_NEW_DATA == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        message: 'chore: sync new movies and posters'
        add: './assets/movie.json'