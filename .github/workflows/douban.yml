name: douban
on: 
  workflow_dispatch:
  repository_dispatch:
    types: [douban-sync]
 # schedule:
 #   - cron: '0 18 * * *'

jobs:
  douban:
    name: Douban mark data sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 1. 从豆瓣拉取文字数据 (movie.csv)
    - name: Fetch Movie Data
      uses: lizheming/doumark-action@master
      with:
        id: jnnsu  # 你的豆瓣 ID
        type: movie
        format: csv
        dir: ./assets

    # 2. 准备 Python 和图像处理依赖
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: pip install Pillow

    # 3. 运行你的黑魔法脚本，自动补全缺失的海报
    - name: Fetch Posters from TMDB
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: python sync_tmdb.py

    # 4. 利用 S3 协议直传到又拍云的 /movie/ 目录下
    - name: Sync Images to Upyun S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.UPYUN_OPERATOR }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.UPYUN_PASSWORD }}
        AWS_DEFAULT_REGION: us-east-1 
      run: |
        aws s3 sync ./temp_posters s3://${{ secrets.UPYUN_SERVICE }}/movie/ --endpoint-url https://s3.api.upyun.com

    # 5. 提交 CSV 更新到你的 GitHub
    - name: Commit
      id: commit_step
      uses: EndBug/add-and-commit@v9
      with:
        message: 'chore: update douban data & posters'
        add: './assets/movie.csv'